name: Spring Boot CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 1. Compile the code (Skipping tests for now!)
      - name: Build with Gradle
        run: ./gradlew clean build -x test

      # 2. Log in to Docker Hub using the secrets you just saved
      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 3. Build the image and tag it with your Docker Hub username
      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/demo-springboot-app:latest .

      # 4. Push the image to the internet
      - name: Push Image to Docker Hub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/demo-springboot-app:latest
      
      # 5. NEW: Trigger Render to pull the new image
      - name: Trigger Render Deploy
        run: curl "${{ secrets.RENDER_DEPLOY_HOOK }}"