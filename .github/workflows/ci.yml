name: Spring Boot CI Pipeline

# 1. THE TRIGGER: When should this run?
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# 2. THE JOBS: What server should we use?
jobs:
  build-test-and-package:
    runs-on: ubuntu-latest # A fresh Ubuntu server in the cloud

    # 3. THE STEPS: What commands do we run?
    steps:
      # Step A: Download your code from the repository onto the Ubuntu server
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # Step B: Install the exact version of Java you need
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Step C: Run your tests and compile the .jar file
      # Note: We are NOT using '-x test' here! We want the pipeline to run the JUnit tests.
      - name: Build and Test with Gradle
        run: ./gradlew clean build

      # Step D: Verify the Dockerfile still works with the newly compiled code
      - name: Build Docker Image
        run: docker build -t demo-spirngboot-app:test-build .